name: Delivery Canary

on:
  schedule:
    - cron: "57 22 * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  canary:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Run delivery canary
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          PUSHPLUS_SECRETKEY: ${{ secrets.PUSHPLUS_SECRETKEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_CHAT_ID: ${{ secrets.FEISHU_CHAT_ID }}
        run: python -m auto_report.cli diagnose-delivery --mode full-report --send --channels feishu --require-feishu-card-success

  reliability-issue:
    needs: canary
    if: always()
    runs-on: ubuntu-latest
    permissions:
      actions: read
      issues: write
    steps:
      - name: Open issue on consecutive canary failures
        uses: actions/github-script@v9.0.0
        with:
          script: |
            const workflowFile = "delivery-canary.yml";
            const runs = await github.paginate(github.rest.actions.listWorkflowRuns, {
              ...context.repo,
              workflow_id: workflowFile,
              per_page: 5,
            });
            const recent = runs
              .filter((run) => run.status === "completed")
              .slice(0, 2);
            if (recent.length < 2 || !recent.every((run) => run.conclusion === "failure")) {
              core.info("No consecutive canary failures detected");
              return;
            }

            const title = "[V7 reliability] consecutive canary failures";
            const openIssues = await github.paginate(github.rest.issues.listForRepo, {
              ...context.repo,
              state: "open",
              creator: "github-actions[bot]",
            });
            if (openIssues.some((issue) => issue.title === title)) {
              core.info("Issue already exists");
              return;
            }

            await github.rest.issues.create({
              ...context.repo,
              title,
              body: "Detected consecutive canary failures across the delivery diagnostic workflow.",
              labels: ["reliability"],
            });
