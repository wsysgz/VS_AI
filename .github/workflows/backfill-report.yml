name: Backfill Report

on:
  workflow_dispatch:
    inputs:
      target_date:
        description: "Target date for the backfill run, for example 2026-04-09"
        required: false
        type: string
      skip_push:
        description: "Skip push notification during this manual run"
        required: false
        default: true
        type: boolean

jobs:
  backfill:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Run render-only backfill scaffold
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          AUTO_PUSH_ENABLED: ${{ inputs.skip_push && 'false' || 'true' }}
        run: python -m auto_report.cli render-report

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: auto-report-backfill-data
          path: data

