name: Compensate Report

on:
  schedule:
    - cron: "43 23 * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  inspect:
    runs-on: ubuntu-latest
    outputs:
      should_compensate: ${{ steps.inspect.outputs.should_compensate }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Decide whether compensation is needed
        id: inspect
        shell: pwsh
        run: |
          $today = [System.TimeZoneInfo]::ConvertTimeBySystemTimeZoneId((Get-Date), "China Standard Time").ToString("yyyy-MM-dd")
          $archiveDir = Join-Path $PWD "data/archives/$today"
          $shouldCompensate = $true
          if (Test-Path $archiveDir) {
            $existing = Get-ChildItem -Path $archiveDir -Filter *.html -ErrorAction SilentlyContinue
            if ($existing) {
              $shouldCompensate = $false
            }
          }
          $runStatusPath = Join-Path $PWD "data/state/run-status.json"
          if (Test-Path $runStatusPath) {
            $status = Get-Content -Raw $runStatusPath | ConvertFrom-Json
            $isTodayStatus = $status.generated_at -like "$today*"
            $allChannelsFailed = ($status.delivery_results.failed_channels.Count -gt 0) -and ($status.delivery_results.successful_channels.Count -eq 0)
            if ($isTodayStatus -and $allChannelsFailed) {
              $shouldCompensate = $true
            }
          }
          "should_compensate=$($shouldCompensate.ToString().ToLower())" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

  compensate:
    needs: inspect
    if: needs.inspect.outputs.should_compensate == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Run compensation report
        env:
          AI_PROVIDER: ${{ vars.AI_PROVIDER || 'deepseek' }}
          AI_BASE_URL: ${{ vars.AI_BASE_URL || 'https://api.deepseek.com' }}
          AI_MODEL: ${{ vars.AI_MODEL || 'deepseek-chat' }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          LANGFUSE_ENABLED: ${{ vars.LANGFUSE_ENABLED || 'false' }}
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
          LANGFUSE_BASE_URL: ${{ vars.LANGFUSE_BASE_URL || 'https://cloud.langfuse.com' }}
          LANGFUSE_ENV: ${{ vars.LANGFUSE_ENV || 'github-actions' }}
          LANGFUSE_CAPTURE_CONTENT: ${{ vars.LANGFUSE_CAPTURE_CONTENT || 'false' }}
          ANALYSIS_AI_PROVIDER: ${{ vars.ANALYSIS_AI_PROVIDER || '' }}
          ANALYSIS_AI_BASE_URL: ${{ vars.ANALYSIS_AI_BASE_URL || '' }}
          ANALYSIS_AI_MODEL: ${{ vars.ANALYSIS_AI_MODEL || '' }}
          ANALYSIS_AI_API_KEY: ${{ secrets.ANALYSIS_AI_API_KEY }}
          SUMMARY_AI_PROVIDER: ${{ vars.SUMMARY_AI_PROVIDER || '' }}
          SUMMARY_AI_BASE_URL: ${{ vars.SUMMARY_AI_BASE_URL || '' }}
          SUMMARY_AI_MODEL: ${{ vars.SUMMARY_AI_MODEL || '' }}
          SUMMARY_AI_API_KEY: ${{ secrets.SUMMARY_AI_API_KEY }}
          FORECAST_AI_PROVIDER: ${{ vars.FORECAST_AI_PROVIDER || '' }}
          FORECAST_AI_BASE_URL: ${{ vars.FORECAST_AI_BASE_URL || '' }}
          FORECAST_AI_MODEL: ${{ vars.FORECAST_AI_MODEL || '' }}
          FORECAST_AI_API_KEY: ${{ secrets.FORECAST_AI_API_KEY }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          PUSHPLUS_SECRETKEY: ${{ secrets.PUSHPLUS_SECRETKEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_CHAT_ID: ${{ secrets.FEISHU_CHAT_ID }}
          REPORT_REPO_URL: https://github.com/wsysgz/VS_AI
          AUTO_PUSH_ENABLED: "true"
          SCHEDULER_TRIGGER_KIND: compensation
          SCHEDULER_COMPENSATION_RUN: "true"
        run: python -m auto_report.cli run-once

      - name: Build Pages site
        run: python -m auto_report.cli build-pages

      - name: Build private ops dashboard
        run: python -m auto_report.cli build-ops-dashboard

      - name: Commit and push compensation outputs
        run: |
          rendered_artifacts_dir="$(mktemp -d)"
          trap 'rm -rf "$rendered_artifacts_dir"' EXIT
          mkdir -p "$rendered_artifacts_dir/data" "$rendered_artifacts_dir/docs/archives" "$rendered_artifacts_dir/docs/weekly" "$rendered_artifacts_dir/docs/special"
          cp -R data/. "$rendered_artifacts_dir/data"/
          cp docs/index.html docs/search-index.json docs/feed.json docs/rss.xml docs/.nojekyll "$rendered_artifacts_dir/docs"/
          cp -R docs/archives/. "$rendered_artifacts_dir/docs/archives"/
          cp -R docs/weekly/. "$rendered_artifacts_dir/docs/weekly"/
          cp -R docs/special/. "$rendered_artifacts_dir/docs/special"/
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          for attempt in 1 2 3; do
            git fetch origin "$GITHUB_REF_NAME"
            git reset --hard "origin/$GITHUB_REF_NAME"
            git clean -fd data/ docs/index.html docs/archives/ docs/weekly/ docs/special/ docs/search-index.json docs/feed.json docs/rss.xml docs/.nojekyll
            mkdir -p data docs/archives docs/weekly docs/special
            cp -R "$rendered_artifacts_dir/data"/. data/
            cp "$rendered_artifacts_dir/docs/index.html" docs/index.html
            cp "$rendered_artifacts_dir/docs/search-index.json" docs/search-index.json
            cp "$rendered_artifacts_dir/docs/feed.json" docs/feed.json
            cp "$rendered_artifacts_dir/docs/rss.xml" docs/rss.xml
            cp "$rendered_artifacts_dir/docs/.nojekyll" docs/.nojekyll
            cp -R "$rendered_artifacts_dir/docs/archives"/. docs/archives/
            cp -R "$rendered_artifacts_dir/docs/weekly"/. docs/weekly/
            cp -R "$rendered_artifacts_dir/docs/special"/. docs/special/
            git add data/ docs/index.html docs/archives/ docs/weekly/ docs/special/ docs/search-index.json docs/feed.json docs/rss.xml docs/.nojekyll
            if git diff --cached --quiet; then
              echo "No compensation changes to commit"
              break
            fi
            git commit -m "chore: compensate daily report [skip ci]"
            if git push origin HEAD:"$GITHUB_REF_NAME"; then
              break
            fi
            if [ "$attempt" = "3" ]; then
              echo "Failed to push compensation outputs after $attempt attempts" >&2
              exit 1
            fi
          done

      - name: Upload ops dashboard artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: compensation-ops-dashboard
          path: out/ops-dashboard/
          retention-days: 7

  reliability-issue:
    needs:
      - inspect
      - compensate
    if: always() && needs.inspect.outputs.should_compensate == 'true'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      issues: write
    steps:
      - name: Open issue on consecutive compensation failures
        uses: actions/github-script@v9.0.0
        with:
          script: |
            const workflowFile = "compensate-report.yml";
            const runs = await github.paginate(github.rest.actions.listWorkflowRuns, {
              ...context.repo,
              workflow_id: workflowFile,
              per_page: 5,
            });
            const recent = runs
              .filter((run) => run.status === "completed")
              .slice(0, 2);
            if (recent.length < 2 || !recent.every((run) => run.conclusion === "failure")) {
              core.info("No consecutive compensation failures detected");
              return;
            }

            const title = "[V7 reliability] consecutive compensation failures";
            const openIssues = await github.paginate(github.rest.issues.listForRepo, {
              ...context.repo,
              state: "open",
              creator: "github-actions[bot]",
            });
            if (openIssues.some((issue) => issue.title === title)) {
              core.info("Issue already exists");
              return;
            }

            await github.rest.issues.create({
              ...context.repo,
              title,
              body: "Detected consecutive compensation failures in the same-day recovery chain.",
              labels: ["reliability"],
            });
