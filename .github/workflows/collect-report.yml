name: Collect And Report

on:
  push:
    branches:
      - main
    paths-ignore:
      - "data/**"
  workflow_dispatch:
  schedule:
    - cron: "17 1,5,9,13 * * *"

concurrency:
  group: collect-report-${{ github.ref }}
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt', 'pyproject.toml') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Run report pipeline
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AUTO_TIMEZONE: Asia/Shanghai
          AUTO_PUSH_ENABLED: true
        run: python -m auto_report.cli run-once

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: auto-report-data
          path: data

      - name: Commit archives
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          git diff --cached --quiet && exit 0
          git commit -m "chore: update auto reports"
          git push
