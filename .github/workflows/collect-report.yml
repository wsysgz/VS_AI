name: Collect And Report

on:
  push:
    branches:
      - main
    paths-ignore:
      - "data/**"
  workflow_dispatch:
    inputs:
      push_enabled:
        description: "Send PushPlus notification for this manual run"
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "0 23 * * *"

concurrency:
  group: collect-report-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ════════════════════════════════════════
  # JOB 0: 测试验证 (Phase 4 可观测性)
  # 与采集并行，不阻塞主流程但结果可见
  # ════════════════════════════════════════
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            .venv
          key: ${{ runner.os }}-pip-test-${{ hashFiles('requirements.txt', 'pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
          pip install pytest

      - name: Run tests
        timeout-minutes: 3
        env:
          PYTHONPATH: src
        run: pytest tests --junitxml=test-results.xml -q --tb=short

      - name: Upload test results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.xml
          retention-days: 7

  # ════════════════════════════════════════
  # JOB 1: 采集 + 预处理 (无AI)
  # ════════════════════════════════════════
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            .venv
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt', 'pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Collect data
        timeout-minutes: 12
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AUTO_TIMEZONE: Asia/Shanghai
        run: python -m auto_report.cli collect-only

      - name: Upload collected data
        uses: actions/upload-artifact@v4
        with:
          name: collected-data
          path: |
            data/reports/
            data/state/
          retention-days: 1

  # ════════════════════════════════════════
  # JOB 2: AI 分析 (最耗时)
  # ════════════════════════════════════════
  analyze:
    needs: collect
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt', 'pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt && pip install -e .

      - name: Download collected data
        uses: actions/download-artifact@v4
        with:
          name: collected-data
          path: data/

      - name: Run AI analysis
        timeout-minutes: 32
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          AI_MODEL: deepseek-chat
          AI_TEMPERATURE: "0.2"
          AUTO_TIMEZONE: Asia/Shanghai
        run: python -m auto_report.cli analyze-only

      - name: Upload analyzed data
        uses: actions/upload-artifact@v4
        with:
          name: analyzed-data
          path: data/
          retention-days: 1

  # ════════════════════════════════════════
  # JOB 3: 渲染 + 推送 + 归档
  # ════════════════════════════════════════
  report:
    needs: analyze
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt && pip install -e .

      - name: Download analyzed data
        uses: actions/download-artifact@v4
        with:
          name: analyzed-data
          path: data/

      - name: Render and push
        timeout-minutes: 8
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          PUSHPLUS_CHANNEL: clawbot
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_CHAT_ID: ${{ secrets.FEISHU_CHAT_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPORT_REPO_URL: https://github.com/wsysgz/VS_AI
          AUTO_TIMEZONE: Asia/Shanghai
          AUTO_PUSH_ENABLED: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.push_enabled == true) }}
        run: python -m auto_report.cli render-and-push

      - name: Auto commit reports
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "chore: update auto reports [skip ci]"
          file_pattern: "data/**"
          commit_user_name: github-actions[bot]
          commit_user_email: 41898282+github-actions[bot]@users.noreply.github.com

      - name: Upload final artifacts
        uses: actions/upload-artifact@v4
        with:
          name: final-report
          path: data/

  # ════════════════════════════════════════
  # JOB 4: 构建并部署 GitHub Pages 站点
  # ════════════════════════════════════════
  deploy-pages:
    needs: report
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: pip install -r requirements.txt && pip install -e .

      - name: Sync latest main before pages build
        run: git pull --rebase origin main

      - name: Download final data
        uses: actions/download-artifact@v4
        with:
          name: final-report
          path: data/

      - name: Build Pages site (outputs to docs/)
        run: python -m auto_report.cli build-pages

      - name: Commit and push docs/
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/index.html docs/archives/ docs/.nojekyll
          git diff --cached --quiet && echo "No changes to deploy" || git commit -m "chore: update pages site [skip ci]"
          git push
