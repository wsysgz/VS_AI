name: Reusable Ops Dashboard

on:
  workflow_call:

jobs:
  ops-dashboard:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt && pip install -e .

      - name: Download final data
        uses: actions/download-artifact@v4
        with:
          name: final-report
          path: data/

      - name: Build private ops dashboard
        run: python -m auto_report.cli build-ops-dashboard

      - name: Build source governance artifact
        run: python -m auto_report.cli build-source-governance

      - name: Upload ops dashboard artifact
        uses: actions/upload-artifact@v4
        with:
          name: ops-dashboard
          path: out/ops-dashboard/
          retention-days: 7

      - name: Upload source governance artifact
        uses: actions/upload-artifact@v4
        with:
          name: source-governance
          path: out/source-governance/
          retention-days: 7
