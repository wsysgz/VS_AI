name: Reusable Backfill

on:
  workflow_call:
    inputs:
      target_date:
        required: false
        type: string
      skip_push:
        required: true
        type: boolean
      publication_mode:
        required: true
        type: string
      reviewer:
        required: false
        type: string
      review_note:
        required: false
        type: string
      scheduler_trigger_kind:
        required: true
        type: string
      scheduler_compensation_run:
        required: true
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  backfill:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Run backfill report
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          PUSHPLUS_SECRETKEY: ${{ secrets.PUSHPLUS_SECRETKEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_CHAT_ID: ${{ secrets.FEISHU_CHAT_ID }}
          AUTO_PUSH_ENABLED: ${{ inputs.skip_push && 'false' || 'true' }}
          PUBLICATION_MODE: ${{ inputs.publication_mode }}
          REPORT_REVIEWER: ${{ inputs.reviewer }}
          REPORT_REVIEW_NOTE: ${{ inputs.review_note }}
          SCHEDULER_TRIGGER_KIND: ${{ inputs.scheduler_trigger_kind }}
          SCHEDULER_COMPENSATION_RUN: ${{ inputs.scheduler_compensation_run }}
          EXTERNAL_ENRICHMENT_ENABLED: "true"
          EXTERNAL_ENRICHMENT_MAX_SIGNALS: "2"
          EXTERNAL_ENRICHMENT_TIMEOUT_SECONDS: "8"
        run: python -m auto_report.cli backfill --target-date "${{ inputs.target_date }}"

      - name: Build Pages site
        run: python -m auto_report.cli build-pages

      - name: Build private ops dashboard
        run: python -m auto_report.cli build-ops-dashboard

      - name: Commit and push backfill outputs
        run: |
          rendered_artifacts_dir="$(mktemp -d)"
          trap 'rm -rf "$rendered_artifacts_dir"' EXIT
          mkdir -p "$rendered_artifacts_dir/data" "$rendered_artifacts_dir/docs/archives" "$rendered_artifacts_dir/docs/weekly" "$rendered_artifacts_dir/docs/special"
          cp -R data/. "$rendered_artifacts_dir/data"/
          cp docs/index.html docs/search-index.json docs/feed.json docs/rss.xml docs/.nojekyll "$rendered_artifacts_dir/docs"/
          cp -R docs/archives/. "$rendered_artifacts_dir/docs/archives"/
          cp -R docs/weekly/. "$rendered_artifacts_dir/docs/weekly"/
          cp -R docs/special/. "$rendered_artifacts_dir/docs/special"/
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          for attempt in 1 2 3; do
            git fetch origin "$GITHUB_REF_NAME"
            git reset --hard "origin/$GITHUB_REF_NAME"
            git clean -fd data/ docs/index.html docs/archives/ docs/weekly/ docs/special/ docs/search-index.json docs/feed.json docs/rss.xml docs/.nojekyll
            mkdir -p data docs/archives docs/weekly docs/special
            cp -R "$rendered_artifacts_dir/data"/. data/
            cp "$rendered_artifacts_dir/docs/index.html" docs/index.html
            cp "$rendered_artifacts_dir/docs/search-index.json" docs/search-index.json
            cp "$rendered_artifacts_dir/docs/feed.json" docs/feed.json
            cp "$rendered_artifacts_dir/docs/rss.xml" docs/rss.xml
            cp "$rendered_artifacts_dir/docs/.nojekyll" docs/.nojekyll
            cp -R "$rendered_artifacts_dir/docs/archives"/. docs/archives/
            cp -R "$rendered_artifacts_dir/docs/weekly"/. docs/weekly/
            cp -R "$rendered_artifacts_dir/docs/special"/. docs/special/
            git add data/ docs/index.html docs/archives/ docs/weekly/ docs/special/ docs/search-index.json docs/feed.json docs/rss.xml docs/.nojekyll
            if git diff --cached --quiet; then
              echo "No backfill changes to commit"
              break
            fi
            git commit -m "chore: backfill report for ${{ inputs.target_date || 'latest' }} [skip ci]"
            if git push origin HEAD:"$GITHUB_REF_NAME"; then
              break
            fi
            if [ "$attempt" = "3" ]; then
              echo "Failed to push backfill outputs after $attempt attempts" >&2
              exit 1
            fi
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: auto-report-backfill-data
          path: |
            data
            docs/index.html
            docs/archives
            docs/weekly
            docs/special
            docs/search-index.json
            docs/feed.json
            docs/rss.xml
            docs/.nojekyll
            out/ops-dashboard
