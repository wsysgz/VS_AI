name: Reusable Report

on:
  workflow_call:
    inputs:
      auto_push_enabled:
        required: true
        type: boolean
      publication_mode:
        required: true
        type: string
      reviewer:
        required: false
        type: string
      review_note:
        required: false
        type: string
      scheduler_trigger_kind:
        required: true
        type: string
      scheduler_compensation_run:
        required: true
        type: boolean

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt && pip install -e .

      - name: Download analyzed data
        uses: actions/download-artifact@v4
        with:
          name: analyzed-data
          path: data/

      - name: Render and push
        timeout-minutes: 8
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          PUSHPLUS_CHANNEL: clawbot
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_CHAT_ID: ${{ secrets.FEISHU_CHAT_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPORT_REPO_URL: https://github.com/wsysgz/VS_AI
          AUTO_TIMEZONE: Asia/Shanghai
          AUTO_PUSH_ENABLED: ${{ inputs.auto_push_enabled }}
          PUBLICATION_MODE: ${{ inputs.publication_mode }}
          REPORT_REVIEWER: ${{ inputs.reviewer }}
          REPORT_REVIEW_NOTE: ${{ inputs.review_note }}
          SCHEDULER_TRIGGER_KIND: ${{ inputs.scheduler_trigger_kind }}
          SCHEDULER_COMPENSATION_RUN: ${{ inputs.scheduler_compensation_run }}
          EXTERNAL_ENRICHMENT_ENABLED: "true"
          EXTERNAL_ENRICHMENT_MAX_SIGNALS: "2"
          EXTERNAL_ENRICHMENT_TIMEOUT_SECONDS: "8"
        run: python -m auto_report.cli render-and-push

      - name: Commit and push reports
        run: |
          rendered_data_dir="$(mktemp -d)"
          trap 'rm -rf "$rendered_data_dir"' EXIT
          cp -R data/. "$rendered_data_dir"/
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          for attempt in 1 2 3; do
            git fetch origin "$GITHUB_REF_NAME"
            git reset --hard "origin/$GITHUB_REF_NAME"
            git clean -fd data/
            mkdir -p data
            cp -R "$rendered_data_dir"/. data/
            git add data/
            if git diff --cached --quiet; then
              echo "No report changes to commit"
              break
            fi
            git commit -m "chore: update auto reports [skip ci]"
            if git push origin HEAD:"$GITHUB_REF_NAME"; then
              break
            fi
            if [ "$attempt" = "3" ]; then
              echo "Failed to push report outputs after $attempt attempts" >&2
              exit 1
            fi
          done

      - name: Upload final artifacts
        uses: actions/upload-artifact@v4
        with:
          name: final-report
          path: data/
