name: Reusable Report

on:
  workflow_call:
    inputs:
      auto_push_enabled:
        required: true
        type: boolean
      publication_mode:
        required: true
        type: string
      reviewer:
        required: false
        type: string
      review_note:
        required: false
        type: string
      scheduler_trigger_kind:
        required: true
        type: string
      scheduler_compensation_run:
        required: true
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt && pip install -e .

      - name: Download analyzed data
        uses: actions/download-artifact@v8.0.1
        with:
          name: analyzed-data
          path: data/

      - name: Render and push
        timeout-minutes: 8
        env:
          AI_PROVIDER: ${{ vars.AI_PROVIDER || 'deepseek' }}
          AI_BASE_URL: ${{ vars.AI_BASE_URL || 'https://api.deepseek.com' }}
          AI_MODEL: ${{ vars.AI_MODEL || 'deepseek-v4-flash' }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          LANGFUSE_ENABLED: ${{ vars.LANGFUSE_ENABLED || 'false' }}
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
          LANGFUSE_BASE_URL: ${{ vars.LANGFUSE_BASE_URL || 'https://cloud.langfuse.com' }}
          LANGFUSE_ENV: ${{ vars.LANGFUSE_ENV || 'github-actions' }}
          LANGFUSE_CAPTURE_CONTENT: ${{ vars.LANGFUSE_CAPTURE_CONTENT || 'false' }}
          ANALYSIS_AI_PROVIDER: ${{ vars.ANALYSIS_AI_PROVIDER || '' }}
          ANALYSIS_AI_BASE_URL: ${{ vars.ANALYSIS_AI_BASE_URL || '' }}
          ANALYSIS_AI_MODEL: ${{ vars.ANALYSIS_AI_MODEL || 'deepseek-v4-pro' }}
          ANALYSIS_AI_API_KEY: ${{ secrets.ANALYSIS_AI_API_KEY }}
          SUMMARY_AI_PROVIDER: ${{ vars.SUMMARY_AI_PROVIDER || '' }}
          SUMMARY_AI_BASE_URL: ${{ vars.SUMMARY_AI_BASE_URL || '' }}
          SUMMARY_AI_MODEL: ${{ vars.SUMMARY_AI_MODEL || 'deepseek-v4-pro' }}
          SUMMARY_AI_API_KEY: ${{ secrets.SUMMARY_AI_API_KEY }}
          FORECAST_AI_PROVIDER: ${{ vars.FORECAST_AI_PROVIDER || '' }}
          FORECAST_AI_BASE_URL: ${{ vars.FORECAST_AI_BASE_URL || '' }}
          FORECAST_AI_MODEL: ${{ vars.FORECAST_AI_MODEL || 'deepseek-v4-pro' }}
          FORECAST_AI_API_KEY: ${{ secrets.FORECAST_AI_API_KEY }}
          PREFILTER_AI_PROVIDER: ${{ vars.PREFILTER_AI_PROVIDER || '' }}
          PREFILTER_AI_BASE_URL: ${{ vars.PREFILTER_AI_BASE_URL || '' }}
          PREFILTER_AI_MODEL: ${{ vars.PREFILTER_AI_MODEL || 'deepseek-v4-flash' }}
          PREFILTER_AI_API_KEY: ${{ secrets.PREFILTER_AI_API_KEY }}
          DISCOVERY_AI_PROVIDER: ${{ vars.DISCOVERY_AI_PROVIDER || '' }}
          DISCOVERY_AI_BASE_URL: ${{ vars.DISCOVERY_AI_BASE_URL || '' }}
          DISCOVERY_AI_MODEL: ${{ vars.DISCOVERY_AI_MODEL || 'deepseek-v4-flash' }}
          DISCOVERY_AI_API_KEY: ${{ secrets.DISCOVERY_AI_API_KEY }}
          SEARCH_AI_PROVIDER: ${{ vars.SEARCH_AI_PROVIDER || '' }}
          SEARCH_AI_BASE_URL: ${{ vars.SEARCH_AI_BASE_URL || '' }}
          SEARCH_AI_MODEL: ${{ vars.SEARCH_AI_MODEL || 'deepseek-v4-flash' }}
          SEARCH_AI_API_KEY: ${{ secrets.SEARCH_AI_API_KEY }}
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_CHAT_ID: ${{ secrets.FEISHU_CHAT_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPORT_REPO_URL: https://github.com/wsysgz/VS_AI
          AUTO_TIMEZONE: Asia/Shanghai
          AUTO_PUSH_ENABLED: ${{ inputs.auto_push_enabled }}
          PUBLICATION_MODE: ${{ inputs.publication_mode }}
          REPORT_REVIEWER: ${{ inputs.reviewer }}
          REPORT_REVIEW_NOTE: ${{ inputs.review_note }}
          SCHEDULER_TRIGGER_KIND: ${{ inputs.scheduler_trigger_kind }}
          SCHEDULER_COMPENSATION_RUN: ${{ inputs.scheduler_compensation_run }}
          EXTERNAL_ENRICHMENT_ENABLED: "true"
          EXTERNAL_ENRICHMENT_MAX_SIGNALS: "2"
          EXTERNAL_ENRICHMENT_TIMEOUT_SECONDS: "8"
        run: python -m auto_report.cli render-and-push

      - name: Commit and push reports
        run: |
          rendered_data_dir="$(mktemp -d)"
          trap 'rm -rf "$rendered_data_dir"' EXIT
          cp -R data/. "$rendered_data_dir"/
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          for attempt in 1 2 3; do
            git fetch origin "$GITHUB_REF_NAME"
            git reset --hard "origin/$GITHUB_REF_NAME"
            git clean -fd data/
            mkdir -p data
            cp -R "$rendered_data_dir"/. data/
            git add data/
            if git diff --cached --quiet; then
              echo "No report changes to commit"
              break
            fi
            git commit -m "chore: update auto reports [skip ci]"
            if git push origin HEAD:"$GITHUB_REF_NAME"; then
              break
            fi
            if [ "$attempt" = "3" ]; then
              echo "Failed to push report outputs after $attempt attempts" >&2
              exit 1
            fi
          done

      - name: Upload final artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: final-report
          path: data/
