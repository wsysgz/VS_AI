name: Reusable Pages

on:
  workflow_call:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy-pages:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"

      - name: Install
        run: pip install -r requirements.txt && pip install -e .

      - name: Sync latest branch state before pages build
        run: git pull --rebase origin "$GITHUB_REF_NAME"

      - name: Download final data
        uses: actions/download-artifact@v8.0.1
        with:
          name: final-report
          path: data/

      - name: Build Pages site (outputs to docs/)
        run: python -m auto_report.cli build-pages

      - name: Commit and push docs/
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/index.html docs/archives/ docs/weekly/ docs/special/ docs/search-index.json docs/feed.json docs/rss.xml docs/.nojekyll
          if git diff --cached --quiet; then
            echo "No changes to deploy"
          else
            git commit -m "chore: update pages site [skip ci]"
          fi
          git push
