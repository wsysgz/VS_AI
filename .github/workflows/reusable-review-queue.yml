name: Reusable Review Queue

on:
  workflow_call:

jobs:
  review-queue:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt && pip install -e .

      - name: Download final report
        uses: actions/download-artifact@v4
        with:
          name: final-report
          path: data/

      - name: Build review queue
        run: python -m auto_report.cli build-review-queue

      - name: Upload review queue artifact
        uses: actions/upload-artifact@v4
        with:
          name: review-queue
          path: out/review-queue/
          retention-days: 7
