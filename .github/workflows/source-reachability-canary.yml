name: Source Reachability Canary

on:
  workflow_dispatch:
  schedule:
    - cron: "41 22 * * *"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"

      - name: Probe blocked official sources
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          from urllib.error import HTTPError, URLError
          import urllib.request

          urls = [
              "https://blog.google/innovation-and-ai/technology/ai/rss/",
              "https://blog.openvino.ai/",
              "https://blog.openvino.ai/feed",
              "https://www.youtube.com/feeds/videos.xml?user=GoogleDevelopers",
              "https://www.youtube.com/feeds/videos.xml?user=nvidia",
          ]

          report = []
          headers = {"User-Agent": "VS_AI source reachability canary"}

          for url in urls:
              row = {"url": url}
              try:
                  request = urllib.request.Request(url, headers=headers)
                  with urllib.request.urlopen(request, timeout=20) as response:
                      row["ok"] = 200 <= response.status < 400
                      row["status_code"] = response.status
                      row["content_type"] = response.headers.get("content-type", "")
                      row["final_url"] = response.geturl()
              except HTTPError as exc:
                  row["ok"] = False
                  row["status_code"] = exc.code
                  row["error"] = f"HTTPError: {exc}"
              except (URLError, TimeoutError) as exc:
                  row["ok"] = False
                  row["error"] = f"{type(exc).__name__}: {exc}"
              report.append(row)

          output_dir = Path("out/source-reachability")
          output_dir.mkdir(parents=True, exist_ok=True)
          (output_dir / "source-reachability-report.json").write_text(
              json.dumps({"probes": report}, ensure_ascii=False, indent=2),
              encoding="utf-8",
          )

          failed = [row["url"] for row in report if not row.get("ok")]
          if failed:
              raise SystemExit(f"Unreachable source probes: {', '.join(failed)}")
          PY

      - name: Upload reachability report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: source-reachability-report
          path: out/source-reachability/
