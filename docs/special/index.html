<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VS_AI 专题</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 32 32%22%3E%3Crect width=%2232%22 height=%2232%22 rx=%228%22 fill=%22%23081018%22/%3E%3Ccircle cx=%2216%22 cy=%2216%22 r=%227%22 fill=%22%2343d1bf%22/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #081018;
    --panel: #101a24;
    --panel-strong: #142231;
    --panel-soft: #0c1620;
    --ink: #edf4f7;
    --muted: #9fb0bd;
    --line: rgba(181, 200, 211, 0.18);
    --accent: #43d1bf;
    --accent-soft: rgba(67, 209, 191, 0.12);
    --blue: #8fb8ff;
    --amber: #e9b56f;
    --danger: #f08d8d;
    --shadow: 0 18px 50px rgba(0, 0, 0, 0.26);
    font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
  }
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    margin: 0;
    color: var(--ink);
    background: linear-gradient(180deg, #071019 0%, #0a121b 58%, #071019 100%);
  }
  a { color: inherit; }
  .site-shell { max-width: 1240px; margin: 0 auto; padding: 0 20px 48px; }
  .topbar {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 16px;
    align-items: center;
    padding: 16px 0;
    color: var(--muted);
    font-size: 14px;
  }
  .brand {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    font-weight: 700;
  }
  .brand-mark {
    width: 10px;
    height: 10px;
    border-radius: 999px;
    background: var(--accent);
    box-shadow: 0 0 18px rgba(67, 209, 191, 0.5);
  }
  .nav-links {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: flex-end;
  }
  .nav-links a {
    color: var(--muted);
    text-decoration: none;
  }
  .nav-links a:hover { color: var(--ink); }
  .workbench {
    display: grid;
    grid-template-columns: minmax(0, 1.35fr) minmax(320px, 0.65fr);
    gap: 16px;
    align-items: stretch;
  }
  .panel,
  .section,
  .stat,
  .signal,
  .article-card,
  .archive-card,
  .summary-card,
  .topic-card,
  .comparison-card,
  .comparison-list,
  .search-hit {
    border: 1px solid var(--line);
    border-radius: 8px;
    background: rgba(16, 26, 36, 0.88);
    box-shadow: var(--shadow);
  }
  .panel { padding: 22px; }
  .section { margin-top: 16px; padding: 22px; }
  .section-title {
    margin: 0 0 14px;
    font-size: 22px;
    line-height: 1.35;
  }
  .page-title {
    margin: 0;
    font-size: 34px;
    line-height: 1.18;
  }
  .eyebrow {
    color: var(--accent);
    font-size: 12px;
    font-weight: 700;
  }
  .subtle { color: var(--muted); }
  .lead {
    margin: 14px 0 0;
    max-width: 820px;
    font-size: 18px;
    line-height: 1.78;
  }
  .compact-list {
    margin: 16px 0 0;
    padding-left: 20px;
    color: var(--muted);
    line-height: 1.72;
  }
  .meta-row,
  .hero-meta,
  .signal-tags,
  .filter-group,
  .archive-meta,
  .feed-links {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .meta-row { margin-top: 16px; }
  .chip,
  .tag {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    min-height: 30px;
    padding: 5px 10px;
    border-radius: 999px;
    border: 1px solid rgba(181, 200, 211, 0.16);
    background: rgba(12, 22, 32, 0.88);
    color: var(--muted);
    font-size: 12px;
    text-decoration: none;
  }
  .chip:hover { color: var(--ink); border-color: rgba(67, 209, 191, 0.36); }
  .tag { color: var(--accent); background: var(--accent-soft); }
  .tag.alt { color: var(--blue); background: rgba(143, 184, 255, 0.12); }
  .tag.warm { color: var(--amber); background: rgba(233, 181, 111, 0.12); }
  .tag.danger { color: var(--danger); background: rgba(240, 141, 141, 0.12); }
  .stats-grid,
  .signal-grid,
  .archive-grid,
  .summary-grid,
  .comparison-grid {
    display: grid;
    gap: 12px;
  }
  .stats-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .summary-grid { grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); }
  .signal-grid { grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); }
  .archive-grid { grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); }
  .comparison-grid { grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); }
  .stat,
  .signal,
  .article-card,
  .archive-card,
  .summary-card,
  .topic-card,
  .comparison-card,
  .comparison-list,
  .search-hit {
    padding: 16px;
    box-shadow: none;
  }
  .stat strong {
    display: block;
    margin-top: 6px;
    font-size: 28px;
    line-height: 1;
  }
  .stat span { color: var(--muted); font-size: 13px; }
  .signal h3,
  .article-card h3,
  .archive-card h3,
  .summary-card h3,
  .topic-card h3,
  .comparison-card h3,
  .comparison-list h3 {
    margin: 8px 0 8px;
    font-size: 17px;
    line-height: 1.42;
  }
  .signal p,
  .article-card p,
  .archive-card p,
  .summary-card p,
  .topic-card p,
  .comparison-card p,
  .comparison-list p {
    margin: 0;
    color: var(--muted);
    line-height: 1.72;
  }
  .comparison-card dl {
    display: grid;
    gap: 8px;
    margin: 12px 0 0;
  }
  .comparison-card dt { color: var(--accent); font-size: 13px; font-weight: 700; }
  .comparison-card dd { margin: 0; color: var(--muted); line-height: 1.68; }
  .comparison-list ul { margin: 10px 0 0; padding-left: 18px; color: var(--muted); line-height: 1.72; }
  .article-card {
    display: flex;
    flex-direction: column;
    min-height: 188px;
  }
  .article-date {
    margin: 0 0 10px;
    color: var(--muted);
    font-size: 13px;
  }
  .article-action {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    align-self: flex-start;
    min-height: 34px;
    margin-top: 14px;
    padding: 7px 13px;
    border-radius: 999px;
    border: 1px solid rgba(67, 209, 191, 0.34);
    background: var(--accent-soft);
    color: var(--ink);
    font-size: 13px;
    text-decoration: none;
  }
  .article-action:hover {
    border-color: rgba(67, 209, 191, 0.64);
    color: var(--accent);
  }
  .signal-footer,
  .archive-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    margin-top: 14px;
    color: var(--muted);
    font-size: 13px;
  }
  .signal a,
  .article-card a,
  .archive-card a,
  .feed-links a {
    text-decoration: none;
  }
  .signal a:hover,
  .article-card a:hover,
  .archive-card a:hover,
  .feed-links a:hover {
    color: var(--accent);
  }
  .search-shell { display: grid; gap: 14px; }
  .search-shell input {
    width: 100%;
    padding: 12px 14px;
    border-radius: 8px;
    border: 1px solid var(--line);
    background: var(--panel-soft);
    color: var(--ink);
    font: inherit;
  }
  .filter-search {
    width: 100%;
    max-width: 360px;
    margin: 0 0 10px;
    padding: 10px 12px;
    border-radius: 8px;
    border: 1px solid var(--line);
    background: var(--panel-soft);
    color: var(--ink);
    font: inherit;
  }
  .search-results { display: grid; gap: 10px; }
  .feed-links { margin-top: 14px; }
  .archive-filters { display: grid; gap: 14px; margin-bottom: 16px; }
  .filter-group button {
    padding: 8px 12px;
    border-radius: 999px;
    border: 1px solid var(--line);
    background: transparent;
    color: var(--muted);
    font: inherit;
    cursor: pointer;
  }
  .filter-group button.is-active,
  .filter-group button:hover {
    color: var(--ink);
    border-color: rgba(67, 209, 191, 0.4);
    background: var(--accent-soft);
  }
  .footer {
    margin-top: 18px;
    padding: 18px 0 6px;
    color: var(--muted);
    text-align: center;
    font-size: 13px;
  }
  @media (max-width: 880px) {
    .site-shell { padding: 0 14px 36px; }
    .topbar { grid-template-columns: 1fr; gap: 10px; }
    .nav-links { justify-content: flex-start; }
    .workbench { grid-template-columns: 1fr; }
    .panel, .section { padding: 18px; }
    .page-title { font-size: 28px; }
    .lead { font-size: 16px; }
    .stats-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .signal-footer,
    .archive-footer {
      align-items: flex-start;
      flex-direction: column;
    }
  }
  @media (max-width: 420px) {
    .stats-grid { grid-template-columns: 1fr; }
    .nav-links { gap: 10px; }
  }
</style>
</head>
<body>
  <div class="site-shell">
    <header class="topbar">
      <a class="brand" href="../"><span class="brand-mark"></span><span>VS_AI</span></a>
      <nav class="nav-links">
        <a href="../">首页</a>
        <a href="../archives/">归档</a>
        <a href="../tracks/">赛道</a>
        <a href="../weekly/">周报</a>
      </nav>
    </header>

    <section class="section">
      <h1 class="section-title">专题</h1>
      <p class="subtle">按“已验证主线”和“高风险观察”聚合跨日报的重点主题，方便长期跟踪。</p>
    </section>

    <section class="section">
      <div class="archive-grid">

  <div class="archive-footer">

  </div>
</article>
      </div>
    </section>
  </div>
</body>
</html>
