sources:
  - id: anthropic-news
    enabled: true
    mode: article_listing
    url: https://www.anthropic.com/news
    category_hint: ai-llm-agent
    max_items: 8
    link_selector: "a[href^='/news/']"
    include_url_patterns:
      - /news/
    exclude_url_patterns:
      - /jobs
      - /about
      - "#"
  - id: deepseek-updates
    enabled: true
    mode: structured_page
    url: https://api-docs.deepseek.com/updates/
    category_hint: ai-llm-agent
    max_items: 8
    entry_selector: "main h3.anchor"
    link_selector: "a.hash-link[href^='#']"
    include_url_patterns:
      - /updates/#
    exclude_url_patterns:
      - /zh-cn/
  - id: qwen-blog
    enabled: true
    mode: json_api
    url: https://qwen.ai/research#research_latest_advancements
    api_url: https://qwen.ai/api/v2/article/retrieval?type=qwen_ai&language=zh-CN
    category_hint: ai-llm-agent
    max_items: 6
    json_items_path:
      - data
      - articles
    item_title_field: title
    item_link_field: path
    item_link_template: https://qwen.ai/blog?id={value}
    item_date_field: extra.date
    include_url_patterns:
      - qwen.ai/blog?id=
    exclude_url_patterns:
      - "#"
  - id: moonshot-blog
    enabled: true
    mode: structured_page
    url: https://platform.moonshot.cn/blog
    category_hint: ai-llm-agent
    max_items: 6
    entry_selector: "div.post-item"
    title_selector: "h3"
    link_selector: "h3 a[href^='/blog/posts/']"
    date_selector: "time[datetime]"
    include_url_patterns:
      - /blog/posts/
    exclude_url_patterns:
      - "#"
  - id: arm-news
    enabled: true
    mode: article_listing
    url: https://newsroom.arm.com/news
    category_hint: ai-x-electronics
    max_items: 6
    link_selector: "a[href*='/news/']"
    include_url_patterns:
      - /news/
    exclude_url_patterns:
      - /about
      - "#"
  - id: qualcomm-onq
    enabled: true
    mode: article_listing
    url: https://www.qualcomm.com/news/onq
    category_hint: ai-x-electronics
    max_items: 6
    link_selector: "a[href*='/news/onq/']"
    include_url_patterns:
      - /news/onq/
    exclude_url_patterns:
      - /support
      - "#"
  - id: nvidia-embedded
    enabled: true
    mode: article_listing
    url: https://developer.nvidia.com/blog/tag/jetson/
    category_hint: ai-x-electronics
    max_items: 6
    link_selector: "a.carousel-row-slide__link[href*='/blog/']"
    include_url_patterns:
      - /blog/
    include_title_patterns:
      - jetson
      - edge
      - embedded
      - tensorrt
      - robotics
      - orin
      - jetpack
      - on-device
    exclude_url_patterns:
      - "#"
    exclude_title_patterns:
      - webinar
      - event
      - register
  - id: openvino-blog
    enabled: true
    mode: structured_page
    url: https://blog.openvino.ai/
    category_hint: ai-x-electronics
    max_items: 6
    entry_selector: "a[href^='/blog-posts/']"
    entry_link_is_self: true
    include_url_patterns:
      - /blog-posts/
    include_title_patterns:
      - openvino
      - npu
      - ai pc
      - inference
      - deployment
      - optimization
      - edge
      - hardware
      - genai
    exclude_url_patterns:
      - "#"
    exclude_title_patterns:
      - webinar
      - event
      - register
      - white paper
  # Keep the approved NXP slot visible, but do not enable it until
  # the public listing page exposes a stable, non-404 entry point for
  # the simple requests-based collector used in this pipeline.
  - id: nxp-edge-ai
    enabled: false
    mode: article_listing
    url: https://github.com/nxp-appcodehub/dm-eiq-genai-flow-demonstrator
    category_hint: ai-x-electronics
    max_items: 4
    stability_tier: manual-watch
    replacement_hint: Prefer the official NXP eIQ GenAI demo repository until a stable public NXP AI listing page is confirmed
    watch_strategy: manual-review
    replacement_target: nxp-appcodehub/dm-eiq-genai-flow-demonstrator
    link_selector: "a[href*='/smarter-world-blog/']"
    include_url_patterns:
      - /smarter-world-blog/
    include_title_patterns:
      - edge ai
      - generative ai
      - eiq
      - genai flow
      - imx
      - embedded ai
      - npu
    exclude_url_patterns:
      - "#"
    exclude_title_patterns:
      - webinar
      - event
      - register
      - white paper
  # --- Round 4 expansion: AI × Electronics high-quality official sources ---
  - id: infineon-blog
    enabled: true
    mode: article_listing
    url: https://www.infineon.com/cms/en/about-infineon/press/press-releases/
    category_hint: ai-x-electronics
    max_items: 6
    link_selector: "a[href*='/press/press-releases/']"
    include_url_patterns:
      - /press/press-releases/
    include_title_patterns:
      - ai
      - machine learning
      - semiconductor
      - power management
      - sensor
      - automotive
      - iot
    exclude_url_patterns:
      - "#"
    exclude_title_patterns:
      - webinar
      - event
      - register
      - invitation
  - id: ti-e2e-blog
    enabled: true
    mode: json_api
    url: https://www.ti.com/about-ti/newsroom/company-blog.html
    api_url: https://www.ti.com/bin/ti/newsroom?page=1&lang=en-us&categories=none&years=none&type=blog
    category_hint: ai-x-electronics
    max_items: 6
    json_items_path: []
    json_items_slice_start: 1
    item_title_field: headline
    item_link_field: path
    item_date_field: date
    include_title_patterns:
      - ai
      - edge ai
      - tda4
      - jacinto
      - am62
      - processor
      - autonomous
      - robot
      - vision
      - edge
    exclude_title_patterns:
      - webinar
      - event
      - register
      - training
