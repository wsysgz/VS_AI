  - id: qualcomm-onq
    enabled: true
    mode: json_api
    url: https://www.qualcomm.com/news/onq
    api_url: https://prdgraphql.www.qualcomm.com/graphql
    api_method: post
    api_request_json:
      operationName: newsFinder
      query: >-
        query newsFinder($searchInput: InterceptorSearchInput!) {
          newsFinder(searchInput: $searchInput) {
            fields filters numberFound spellcheck start resources
          }
        }
      variables:
        searchInput:
          requestGuid: vs-ai-watch
          resourceFields:
            - title
            - url
            - field_blog_author_title
            - field_blog_teaser_image_file_url
            - field_blog_teaser_image_title
            - field_blog_type
            - field_content_tags_name
            - field_pr_body_summary
            - field_press_note
            - field_publish_date
            - readTime
            - hardwareCategories
          rows: 24
          sourceApplication: WWW-AEM
          start: 0
          filterFields:
            - field: isDownloadable
              values:
                - "False"
            - field: resourceSubType
              values:
                - blog
            - field: field_blog_type
              values:
                - "0"
          searchText: ""
          sessionGuid: vs-ai-watch
          sortFields:
            field: publishedOn
            order: desc
    category_hint: ai-x-electronics
    region_scope: intl
    org_origin: qualcomm
    tech_track: embedded
    comparison_priority: high
    max_items: 6
    json_items_path:
      - data
      - newsFinder
      - resources
    item_title_field: title
    item_link_field: url
    item_date_field: publishedOn
    include_title_patterns:
      - ai
      - edge
      - iot
      - robotics
      - camera
      - industrial
      - automotive
      - compute
    exclude_title_patterns:
      - webinar
      - event
      - register
