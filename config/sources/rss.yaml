sources:
  - id: huggingface-blog
    enabled: true
    url: https://huggingface.co/blog/feed.xml
    category_hint: ai-llm-agent
    max_items: 12
  - id: openai-news
    enabled: true
    url: https://openai.com/news/rss.xml
    category_hint: ai-llm-agent
    max_items: 8
    exclude_title_patterns:
      - contest
      - terms & conditions
  - id: google-deepmind-blog
    enabled: true
    url: https://deepmind.google/blog/?feed=atom
    category_hint: ai-llm-agent
    max_items: 8
  - id: meta-ai-blog
    enabled: true
    url: https://ai.meta.com/blog/rss/
    category_hint: ai-llm-agent
    max_items: 6
    stability_tier: manual-watch
    replacement_hint: Confirm a live Meta AI feed or disable this slot
    watch_strategy: manual-review
    replacement_target: official-meta-feed
    exclude_title_patterns:
      - contest
      - hackathon
  - id: microsoft-research
    enabled: true
    url: https://www.microsoft.com/en-us/research/blog/feed/
    category_hint: ai-llm-agent
    max_items: 6
    exclude_title_patterns:
      - job
      - hiring
      - career
  # --- Phase 3 新增 RSS ---
  - id: arxiv-cs-ai
    enabled: true
    url: https://export.arxiv.org/api/query?search_query=cat:cs.AI&start=0&max_results=10&sortBy=lastUpdatedDate&sortOrder=descending
    category_hint: ai-llm-agent
    max_items: 10
    stability_tier: stable-feed
    replacement_hint: ""
    exclude_title_patterns:
      - arXiv
      - comment
      - withdrawn
  - id: google-ai-edge
    enabled: true
    url: https://blog.google/innovation-and-ai/technology/ai/rss/
    category_hint: ai-x-electronics
    max_items: 6
    include_title_patterns:
      - litert
      - on-device
      - google ai edge
      - npu
      - edge ai
    exclude_title_patterns:
      - event
      - register
      - partner
  - id: youtube-google-developers
    enabled: true
    url: https://www.youtube.com/feeds/videos.xml?user=GoogleDevelopers
    category_hint: ai-x-electronics
    max_items: 6
    timeout_seconds: 8
    include_title_patterns:
      - litert
      - gemma
      - on-device
      - edge ai
      - npu
      - ml kit
    exclude_title_patterns:
      - livestream
      - live at
      - recap
  - id: youtube-nvidia
    enabled: true
    url: https://www.youtube.com/feeds/videos.xml?user=nvidia
    category_hint: ai-x-electronics
    max_items: 6
    timeout_seconds: 8
    include_title_patterns:
      - jetson
      - tensorrt
      - robotics
      - edge ai
      - on-device
      - physical ai
    exclude_title_patterns:
      - livestream
      - live at
      - replay
  - id: youtube-microsoft-developer
    enabled: true
    url: https://www.youtube.com/feeds/videos.xml?user=Microsoftdeveloper
    category_hint: ai-llm-agent
    max_items: 6
    timeout_seconds: 8
    include_title_patterns:
      - copilot
      - azure ai
      - phi
      - agent
      - on-device
    exclude_title_patterns:
      - livestream
      - live at
      - recap
  - id: youtube-pytorch
    enabled: true
    url: https://www.youtube.com/feeds/videos.xml?user=pytorch
    category_hint: ai-llm-agent
    max_items: 6
    timeout_seconds: 8
    include_title_patterns:
      - pytorch
      - llm
      - inference
      - edge
      - agent
      - torch
    exclude_title_patterns:
      - livestream
      - live at
      - recap
