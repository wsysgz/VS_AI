sources:
  - id: huggingface-blog
    enabled: true
    url: https://huggingface.co/blog/feed.xml
    category_hint: ai-llm-agent
    max_items: 12
  - id: openai-news
    enabled: true
    url: https://openai.com/news/rss.xml
    category_hint: ai-llm-agent
    max_items: 8
    exclude_title_patterns:
      - contest
      - terms & conditions
  - id: google-deepmind-blog
    enabled: true
    url: https://deepmind.google/blog/?feed=atom
    category_hint: ai-llm-agent
    max_items: 8
  - id: meta-ai-blog
    enabled: true
    url: https://about.fb.com/news/category/technology-and-innovation/feed/
    category_hint: ai-llm-agent
    max_items: 6
    stability_tier: stable-feed
    replacement_hint: ""
    watch_strategy: feed-poll
    replacement_target: none
    include_title_patterns:
      - ai
      - llama
      - model
      - silicon
    exclude_title_patterns:
      - contest
      - hackathon
  - id: microsoft-research
    enabled: true
    url: https://www.microsoft.com/en-us/research/blog/feed/
    category_hint: ai-llm-agent
    max_items: 6
    exclude_title_patterns:
      - job
      - hiring
      - career
  # --- Phase 3 新增 RSS ---
  - id: arxiv-cs-ai
    enabled: true
    url: https://export.arxiv.org/api/query?search_query=cat:cs.AI&start=0&max_results=10&sortBy=lastUpdatedDate&sortOrder=descending
    category_hint: ai-llm-agent
    max_items: 10
    stability_tier: stable-feed
    replacement_hint: ""
    exclude_title_patterns:
      - arXiv
      - comment
      - withdrawn
  - id: google-ai-edge
    enabled: true
    url: https://blog.google/innovation-and-ai/technology/ai/rss/
    category_hint: ai-x-electronics
    max_items: 6
    include_title_patterns:
      - litert
      - on-device
      - google ai edge
      - npu
      - edge ai
    exclude_title_patterns:
      - event
      - register
      - partner
  - id: youtube-google-developers
    enabled: true
    url: https://www.youtube.com/feeds/videos.xml?channel_id=UC_x5XG1OV2P6uZZ5FSM9Ttw
    category_hint: ai-x-electronics
    max_items: 6
    timeout_seconds: 8
    include_title_patterns:
      - litert
      - gemma
      - on-device
      - edge ai
      - npu
      - ml kit
    exclude_title_patterns:
      - livestream
      - live at
      - recap
  - id: youtube-nvidia
    enabled: true
    url: https://www.youtube.com/feeds/videos.xml?user=nvidia
    category_hint: ai-x-electronics
    max_items: 6
    timeout_seconds: 8
    include_title_patterns:
      - jetson
      - tensorrt
      - robotics
      - edge ai
      - on-device
      - physical ai
    exclude_title_patterns:
      - livestream
      - live at
      - replay
  - id: arm-news
    enabled: true
    url: https://newsroom.arm.com/news/feed/
    category_hint: ai-x-electronics
    max_items: 6
    stability_tier: stable-feed
    replacement_hint: ""
    watch_strategy: feed-poll
    replacement_target: none
    include_title_patterns:
      - ai
      - arm
      - npu
      - edge
      - robotics
      - vision
    exclude_title_patterns:
      - webinar
      - event
      - register
      - summit
  - id: nvidia-embedded
    enabled: true
    url: https://developer.nvidia.com/blog/tag/jetson/feed/
    category_hint: ai-x-electronics
    max_items: 6
    stability_tier: stable-feed
    replacement_hint: ""
    watch_strategy: feed-poll
    replacement_target: none
    include_title_patterns:
      - jetson
      - edge
      - embedded
      - tensorrt
      - robotics
      - orin
      - jetpack
      - on-device
    exclude_title_patterns:
      - webinar
      - event
      - register
  - id: st-blog
    enabled: true
    url: https://blog.st.com/tag/ai/feed/
    category_hint: ai-x-electronics
    max_items: 6
    stability_tier: stable-feed
    replacement_hint: ""
    watch_strategy: feed-poll
    replacement_target: none
    timeout_seconds: 8
    include_title_patterns:
      - ai
      - stm32
      - nanoedge
      - npu
      - edge
    exclude_title_patterns:
      - webinar
      - event
      - register
      - summit
