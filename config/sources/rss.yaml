sources:
  - id: huggingface-blog
    enabled: true
    url: https://huggingface.co/blog/feed.xml
    category_hint: ai-llm-agent
    max_items: 12
  - id: openai-news
    enabled: true
    url: https://openai.com/news/rss.xml
    category_hint: ai-llm-agent
    max_items: 8
    exclude_title_patterns:
      - contest
      - terms & conditions
  - id: google-deepmind-blog
    enabled: true
    url: https://deepmind.google/blog/?feed=atom
    category_hint: ai-llm-agent
    max_items: 8
  - id: meta-ai-blog
    enabled: true
    url: https://ai.meta.com/blog/rss/
    category_hint: ai-llm-agent
    max_items: 6
    exclude_title_patterns:
      - contest
      - hackathon
  - id: microsoft-research
    enabled: true
    url: https://www.microsoft.com/en-us/research/blog/feed/
    category_hint: ai-llm-agent
    max_items: 6
    exclude_title_patterns:
      - job
      - hiring
      - career
  # --- Phase 3 新增 RSS ---
  - id: arxiv-cs-ai
    enabled: true
    url: https://rss.arxiv.org/cs.AI
    category_hint: ai-llm-agent
    max_items: 10
    exclude_title_patterns:
      - arXiv
      - comment
      - withdrawn
