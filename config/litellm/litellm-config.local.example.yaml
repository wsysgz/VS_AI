model_list:
  - model_name: vs-ai-default
    litellm_params:
      model: openai/deepseek-chat
      api_base: https://api.deepseek.com/v1
      api_key: os.environ/LITELLM_DEEPSEEK_API_KEY
  - model_name: vs-ai-analysis
    litellm_params:
      model: openai/deepseek-chat
      api_base: https://api.deepseek.com/v1
      api_key: os.environ/LITELLM_DEEPSEEK_API_KEY
  - model_name: vs-ai-forecast
    litellm_params:
      model: openai/deepseek-chat
      api_base: https://api.deepseek.com/v1
      api_key: os.environ/LITELLM_DEEPSEEK_API_KEY

